spring.application.name=chatapp
# Server
server.port=8080

spring.profiles.active=${APP_PROFILE:local}

# PostgreSQL - Supabase
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Spring AI - Mistral AI
# Get your key from: https://console.mistral.ai/
spring.ai.mistralai.api-key=${MISTRAL_API_KEY}

# Model options (pick one):
#   open-mistral-7b       → Fastest, cheapest (free tier)
#   mistral-small-latest  → Good balance (RECOMMENDED)
#   mistral-medium-latest → Better quality
#   mistral-large-latest  → Best quality
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.7
